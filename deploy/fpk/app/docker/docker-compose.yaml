version: '3.8'
services:
  notepad:
    image: wycto/notepad:1.0.0
    container_name: fnos_notepad
    ports:
      - "${web_port:-8904}:8904"
    volumes:
      - /vol*/@appdata/notepad/data:/app/data
    environment:
      - PORT=8904
      - DB_PATH=/app/data/notepad.db
      - JWT_SECRET=${jwt_secret:-}
      - TZ=Asia/Shanghai
    restart: unless-stopped
